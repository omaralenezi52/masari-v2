{% extends "base.html" %}
{% block title %}أكمل بياناتك — مساري{% endblock %}
{% block extra_css %}
<style>
.onboard-wrap { max-width: 580px; margin: 0 auto; }
.onboard-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.onboard-header {
  background: linear-gradient(135deg, var(--primary-d), #1A4A8F);
  padding: 2rem;
  text-align: center;
  color: var(--white);
}
.onboard-header h2 {
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: 1.4rem;
  margin-bottom: .3rem;
}
.onboard-header p { opacity: .75; font-size: .9rem; }
.onboard-body { padding: 2rem; }

.edu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .7rem;
  margin-bottom: 1.5rem;
}
.edu-option { position: relative; }
.edu-option input[type=radio] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.edu-option label {
  display: flex;
  align-items: center;
  gap: .7rem;
  padding: .9rem 1rem;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-weight: 600;
  font-size: .9rem;
  color: var(--ink-2);
  transition: var(--transition);
  background: var(--bg);
}
.edu-option label .edu-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
  transition: var(--transition);
}
.edu-option input[type=radio]:checked + label {
  border-color: var(--primary);
  background: #EEF4FF;
  color: var(--primary-d);
}
.edu-option input[type=radio]:checked + label .edu-icon {
  background: var(--primary);
}
.edu-option label:hover {
  border-color: var(--primary-l);
  background: #F5F8FF;
}

@media (max-width: 480px) {
  .edu-grid { grid-template-columns: 1fr; }
}
</style>
{% endblock %}

{% block content %}
<div class="onboard-wrap">
  <div class="onboard-card">

    <div class="onboard-header">
      <h2>مرحباً {{ current_user.username }} 👋</h2>
      <p>خطوة أخيرة — اختر مستواك التعليمي لنخصص تجربتك</p>
    </div>

    <div class="onboard-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="edu-grid">
          <div class="edu-option">
            <input type="radio" name="edu_level" id="edu1" value="ثانوي" required>
            <label for="edu1">
              <span class="edu-icon">🏫</span>
              ثانوي أو أقل
            </label>
          </div>
          <div class="edu-option">
            <input type="radio" name="edu_level" id="edu2" value="دبلوم">
            <label for="edu2">
              <span class="edu-icon">📋</span>
              دبلوم
            </label>
          </div>
          <div class="edu-option">
            <input type="radio" name="edu_level" id="edu3" value="بكالوريوس">
            <label for="edu3">
              <span class="edu-icon">🎓</span>
              بكالوريوس
            </label>
          </div>
          <div class="edu-option">
            <input type="radio" name="edu_level" id="edu4" value="ماجستير">
            <label for="edu4">
              <span class="edu-icon">📚</span>
              ماجستير
            </label>
          </div>
          <div class="edu-option">
            <input type="radio" name="edu_level" id="edu5" value="دكتوراه">
            <label for="edu5">
              <span class="edu-icon">🔬</span>
              دكتوراه
            </label>
          </div>
          <div class="edu-option">
            <input type="radio" name="edu_level" id="edu6" value="أخرى">
            <label for="edu6">
              <span class="edu-icon">💡</span>
              أخرى
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          ابدأ استكشاف الفرص →
        </button>

      </form>
    </div>

  </div>
</div>
{% endblock %}

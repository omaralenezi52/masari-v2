  <text x="402" y="209" font-size="11" fill="#334155">phone</text>
  <text x="606" y="209" text-anchor="end" font-size="10" fill="#94A3B8">VARCHAR(20)</text>

  <line x1="390" y1="216" x2="610" y2="216" stroke="#F1F5F9" stroke-width="1"/>

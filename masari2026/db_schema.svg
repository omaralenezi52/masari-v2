  <text x="550" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="white">مخطط قاعدة بيانات منصة مساري</text>
  <text x="550" y="50" text-anchor="middle" font-size="11" fill="#BFDBFE">Masari Platform — Entity Relationship Diagram</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- TABLE: users (center-top) -->

    <rect x="390" y="126" width="220" height="246" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>

  <!-- users rows -->
  <rect x="390" y="126" width="220" height="24" fill="#EEF4FF"/>
